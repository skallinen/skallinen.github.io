<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda — Family Year Planner</title>
    <meta name="description" content="See a quarter of family life in one eyeful; plan a year in one scroll.">

    <!-- Design System -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Scittle & Reagent -->
    <script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.js" type="application/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.reagent.js" type="application/javascript"></script>

    <!-- Firebase (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- App Logic (order matters for Scittle ns resolution)
         Tiers: domain/layout are PURE (portable core, see product-design.md Layer 9);
         everything below them may touch Firebase/Reagent. -->
    <script type="application/x-scittle" src="src/config.cljs"></script>
    <script type="application/x-scittle" src="src/interactions.cljc"></script>
    <script type="application/x-scittle" src="src/domain.cljs"></script>
    <script type="application/x-scittle" src="src/layout.cljs"></script>
    <script type="application/x-scittle" src="src/router.cljs"></script>
    <script type="application/x-scittle" src="src/auth.cljs"></script>
    <script type="application/x-scittle" src="src/state.cljs"></script>
    <script type="application/x-scittle" src="src/db.cljs"></script>
    <script type="application/x-scittle" src="src/render.cljs"></script>
    <script type="application/x-scittle" src="src/views.cljs"></script>
    <script type="application/x-scittle" src="src/main.cljs"></script>
</head>
<body>
    <div id="app"></div>
</body>
</html>
