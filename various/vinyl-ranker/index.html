<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Ranker</title>
    <link rel="stylesheet" href="style.css">

    <!-- Scittle & Reagent Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.reagent.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Openskill (Bundle.run for UMD) -->
    <script type="module">
        import { rate, rating, ordinal } from 'https://cdn.skypack.dev/openskill';
        window.openskill = { rate, rating, ordinal };
        console.log("Openskill loaded via Skypack:", window.openskill);
    </script>

    <!-- App Logic -->
    <script type="application/x-scittle" src="src/app.cljs"></script>
</head>

<body>
    <div id="app"></div>
</body>

</html>
