<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Wishlist</title>
    <link rel="stylesheet" href="style.css">

    <!-- Scittle & Reagent Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.reagent.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Google Fonts: Space Grotesk & Roboto Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Openskill (via esm.sh) -->
    <script type="module">
        import { rate, rating, ordinal } from 'https://esm.sh/openskill';
        window.openskill = { rate, rating, ordinal };
        console.log("Openskill loaded via esm.sh:", window.openskill);
    </script>

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

    <!-- App Logic -->
    <script type="application/x-scittle" src="../src/nav.cljs"></script>
    <script type="application/x-scittle" src="src/app.cljs"></script>
</head>

<body>
    <div id="app"></div>
</body>

</html>
